// library/build.gradle
apply plugin: 'maven-publish'
apply plugin: 'signing'
apply plugin: 'com.vanniktech.maven.publish.base'

mavenPublishing {
    publishToMavenCentral()
    signAllPublications()
}

// 配置Maven发布
publishing {
    publications {
        aar(MavenPublication) {
            groupId = 'io.github.itlattice'
            artifactId = 'aliyunFacade'
            version = '1.0.2'
            
            // 指定AAR文件路径
            artifact("$projectDir/src/main/aar/aliyun-facade-2.3.35.250512103048.aar")
            
            // 添加POM元数据
            pom {
                name = 'aliyunFacade'
                description = 'aliyunFacade - Android Library for aliyunFacade'
                url = 'https://github.com/iboxsandroid/DCUniMPSDK'
                inceptionYear = '2024'
                
                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                }
                
                developers {
                    developer {
                        id = 'iboxsandroid'
                        name = 'iboxsandroid'
                        email = 'your@example.com'
                    }
                }
                
                scm {
                    connection = 'scm:git:git://github.com/iboxsandroid/aliyunFacade.git'
                    developerConnection = 'scm:git:ssh://github.com/iboxsandroid/aliyunFacade.git'
                    url = 'https://github.com/iboxsandroid/aliyunFacade'
                }
            }
        }
    }
}

// 配置签名
signing {
    useGpgCmd()
    sign publishing.publications.aar
}